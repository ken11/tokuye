name: Release Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: tokuye-linux-x86_64
          - os: ubuntu-22.04-arm
            artifact_name: tokuye-linux-arm64
          - os: macos-13
            artifact_name: tokuye-darwin-x86_64
          - os: macos-14
            artifact_name: tokuye-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ccache (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ccache

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-

      - name: Configure ccache
        run: |
          ccache --max-size=500M
          ccache --zero-stats

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build binary with Nuitka
        env:
          CCACHE_DIR: ~/.ccache
          CC: ccache gcc
          CXX: ccache g++
        run: |
          uv run python -m nuitka \
            --mode=onefile \
            --follow-imports \
            --include-package=tokuye \
            --include-package=botocore \
            --include-package=rich._unicode_data \
            --include-package-data=tokuye \
            --output-filename=tokuye \
            --output-dir=dist \
            src/tokuye/main.py

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Rename artifact
        run: mv dist/tokuye dist/${{ matrix.artifact_name }}

      - name: Smoke test
        run: dist/${{ matrix.artifact_name }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          for f in \
            tokuye-linux-x86_64/tokuye-linux-x86_64 \
            tokuye-linux-arm64/tokuye-linux-arm64 \
            tokuye-darwin-x86_64/tokuye-darwin-x86_64 \
            tokuye-darwin-arm64/tokuye-darwin-arm64; do
            sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tokuye-linux-x86_64/tokuye-linux-x86_64
            dist/tokuye-linux-x86_64/tokuye-linux-x86_64.sha256
            dist/tokuye-linux-arm64/tokuye-linux-arm64
            dist/tokuye-linux-arm64/tokuye-linux-arm64.sha256
            dist/tokuye-darwin-x86_64/tokuye-darwin-x86_64
            dist/tokuye-darwin-x86_64/tokuye-darwin-x86_64.sha256
            dist/tokuye-darwin-arm64/tokuye-darwin-arm64
            dist/tokuye-darwin-arm64/tokuye-darwin-arm64.sha256
          generate_release_notes: true
