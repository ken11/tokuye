name: Release Binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: tokuye-linux-x86_64
            binary_name: tokuye
          - os: ubuntu-24.04-arm
            artifact_name: tokuye-linux-arm64
            binary_name: tokuye
          - os: macos-15-intel
            artifact_name: tokuye-darwin-x86_64
            binary_name: tokuye
          - os: macos-15
            artifact_name: tokuye-darwin-arm64
            binary_name: tokuye
          - os: windows-2025
            artifact_name: tokuye-windows-x86_64.exe
            binary_name: tokuye.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ runner.arch }}-

      - name: Install dependencies
        run: uv sync --all-extras --frozen

      - name: Build binary with Nuitka
        shell: bash
        run: |
          uv run python -m nuitka \
            --mode=onefile \
            --follow-imports \
            --include-package=tokuye \
            --include-package-data=tokuye \
            --include-package-data=botocore \
            --include-module=rich._unicode_data \
            --assume-yes-for-downloads \
            --output-filename=tokuye \
            --output-dir=dist \
            src/tokuye/main.py

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/${{ matrix.binary_name }} dist/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item "dist\\${{ matrix.binary_name }}" "dist\\${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          for f in \
            tokuye-linux-x86_64/tokuye-linux-x86_64 \
            tokuye-linux-arm64/tokuye-linux-arm64 \
            tokuye-darwin-x86_64/tokuye-darwin-x86_64 \
            tokuye-darwin-arm64/tokuye-darwin-arm64 \
            tokuye-windows-x86_64.exe/tokuye-windows-x86_64.exe; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tokuye-linux-x86_64/tokuye-linux-x86_64
            dist/tokuye-linux-x86_64/tokuye-linux-x86_64.sha256
            dist/tokuye-linux-arm64/tokuye-linux-arm64
            dist/tokuye-linux-arm64/tokuye-linux-arm64.sha256
            dist/tokuye-darwin-x86_64/tokuye-darwin-x86_64
            dist/tokuye-darwin-x86_64/tokuye-darwin-x86_64.sha256
            dist/tokuye-darwin-arm64/tokuye-darwin-arm64
            dist/tokuye-darwin-arm64/tokuye-darwin-arm64.sha256
            dist/tokuye-windows-x86_64.exe/tokuye-windows-x86_64.exe
            dist/tokuye-windows-x86_64.exe/tokuye-windows-x86_64.exe.sha256
          generate_release_notes: true
